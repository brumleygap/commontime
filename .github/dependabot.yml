version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      astro-ecosystem:
        patterns:
          - "astro"
          - "@astrojs/*"
    ignore:
      # Stay on Tailwind 3 — Tailwind 4 requires migration work.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
